services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: plume
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ""
      POSTGRES_HOST_AUTH_METHOD: trust   # pas de mot de passe en dev local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data   # données persistantes entre redémarrages
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@plume.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"                          # interface web → http://localhost:5050
    depends_on:
      - postgres

volumes:
  postgres_data:
